# Related scripts
train_script_name: common
module_script_name: SCANSR
CUDA_VISIBLE_DEVICES: '0'
class_name: SCANSR
# Model Configuration
feature_num: 64
# feature_num: 72
module_params:
  upsampling: 4
  res_num: 5
  block_num: 1
  bias: True
  block_script_name: OSA
  block_class_name: OSA_Block
  window_size: 8
  pe: True
  ffn_bias: True

  # output_aug: True

# Training information
total_epoch: 100

# Dataset
dataloader: ixi
dataset_name: ixi
batch_size: 14
random_seed: 1234
dataset_params:
  dataloader_num: 'None' # 100 test only
  lr_patch_size: 64
  degradation: bicubic
  image_scale: 4
  subffix: png
  dataloader_workers: 6
  dataset_enlarge: 64
  color_jitter: False
  color_config:
    brightness: 0.02
    contrast:   0.02
    saturation: 0.02
    hue:        0.02
  enable_reshuffle: False

eval_dataloader: memory
eval_dataset_name: urban100
eval_batch_size: 1

# Optimizer
lr_decay: 0.5
lr_decay_step: [100]
lr_decay_enable: True
optim_type: AdamW
optim_config:
  lr: !!float 1e-4
  betas: [0.9, 0.999]
  weight_decay: !!float 1e-4

# Losses
l1_weight: 1.0

# Log
log_step: 100
sample_step: 200
model_save_epoch: 1
use_tensorboard: True
checkpoint_names:
  generator_name: OmniSR